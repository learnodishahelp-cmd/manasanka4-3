<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ଶ୍ରେଣୀ ୪ - ଗୁଣନ | Class 4 Multiplication</title>
    <style>
        :root {
            --bg: #f5f0ff;
            --card-bg: #ffffff;
            --primary: #6a1b9a;
            --primary-light: #f3e5f5;
            --secondary: #00838f;
            --accent: #ff6f00;
            --text: #2d1b36;
            --text-light: #4a3b52;
            --border: #e1d5f0;
            --shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 28px rgba(0, 0, 0, 0.12);
            --radius: 22px;
            --radius-sm: 14px;
            --font-odia: 'Noto Sans Oriya', 'Noto Sans', 'Arial Unicode MS', sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-odia);
            background: linear-gradient(145deg, #f5f0ff 0%, #ede0f5 30%, #fff8f0 80%, #f5f0ff 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: -130px;
            right: -70px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(106, 27, 154, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -110px;
            left: -80px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(0, 131, 143, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Header with share button */
        .header {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 18px 14px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ab47bc, #ff6f00, #ab47bc, #00838f, #ab47bc);
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .share-btn-top {
            position: absolute;
            top: 14px;
            right: 16px;
            background: #f3e5f5;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(106, 27, 154, 0.15);
            transition: all 0.25s ease;
            z-index: 2;
            color: #6a1b9a;
            -webkit-tap-highlight-color: transparent;
        }
        .share-btn-top:hover {
            background: #e1bee7;
            transform: scale(1.08);
        }
        .share-btn-top:active {
            transform: scale(0.94);
            background: #ce93d8;
        }
        .share-btn-top svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .header .icon-row {
            font-size: 38px;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            gap: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }
        .header h1 {
            font-size: clamp(1.6rem, 4.5vw, 2rem);
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1.3;
        }
        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-top: 2px;
            font-weight: 500;
        }
        .header .badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 6px;
            letter-spacing: 0.03em;
        }

        /* Info Cards */
        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
            text-align: center;
            transition: var(--transition);
            cursor: default;
        }
        .info-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        .info-card .card-emoji {
            font-size: 34px;
            margin-bottom: 4px;
        }
        .info-card h3 {
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 700;
        }
        .info-card p {
            font-size: 0.78rem;
            color: var(--text-light);
            margin-top: 2px;
            line-height: 1.4;
        }
        .info-card.card-accent h3 {
            color: var(--accent);
        }
        .info-card.card-accent {
            border-color: #ffe0b2;
        }

        /* Video Card */
        .video-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 2px solid var(--border);
            transition: var(--transition);
        }
        .video-card:hover {
            box-shadow: var(--shadow-hover);
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #1a1a1a;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fffbfe;
            border-top: 1px solid var(--border);
        }
        .video-info .play-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ab47bc;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(171, 71, 188, 0.45);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(171, 71, 188, 0);
            }
        }
        .video-info .play-icon svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }
        .video-info .info-text {
            flex: 1;
            min-width: 0;
        }
        .video-info .part-label {
            font-size: 0.75rem;
            color: #6a1b9a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .video-info .part-title {
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tabs Navigation */
        .tabs-nav {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 4px 2px 8px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tabs-nav::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 0 0 auto;
            padding: 11px 20px;
            border-radius: 30px;
            border: 2px solid #d1c4e9;
            background: #faf8ff;
            color: var(--text-light);
            font-family: var(--font-odia);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            letter-spacing: 0.02em;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-btn:hover {
            background: #f3e5f5;
            border-color: #b39ddb;
            color: #6a1b9a;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(106, 27, 154, 0.35);
            transform: translateY(-2px);
        }
        .tab-btn .tab-emoji {
            display: inline-block;
            margin-right: 5px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 8px 4px 20px;
            font-size: 0.75rem;
            color: #8d7b9c;
            letter-spacing: 0.03em;
        }
        .footer span {
            color: #6a1b9a;
            font-weight: 600;
        }

        /* Toast for copy */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #4a148c;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: 0 10px 20px rgba(74, 20, 140, 0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        @media (max-width: 420px) {
            .app-container {
                gap: 12px;
            }
            .header {
                padding: 16px 12px 12px;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .header .icon-row {
                font-size: 32px;
                gap: 8px;
            }
            .tab-btn {
                padding: 9px 14px;
                font-size: 0.8rem;
            }
            .info-cards {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .info-card {
                padding: 12px 10px;
            }
            .video-info {
                padding: 10px 12px;
                gap: 8px;
            }
            .video-info .play-icon {
                width: 30px;
                height: 30px;
            }
            .share-btn-top {
                width: 36px;
                height: 36px;
                top: 12px;
                right: 12px;
            }
            .share-btn-top svg {
                width: 18px;
                height: 18px;
            }
        }
        @media (min-width: 421px) and (max-width: 768px) {
            .app-container {
                max-width: 560px;
            }
        }
        @media (min-width: 769px) {
            .app-container {
                max-width: 620px;
            }
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header with Share Button -->
        <header class="header">
            <button class="share-btn-top" id="shareButton" aria-label="Share this app" title="Share">
                <svg viewBox="0 0 24 24">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
                </svg>
            </button>
            <div class="icon-row">✖️🔢🧮</div>
            <h1>ଶ୍ରେଣୀ ୪ - ଗଣିତ</h1>
            <p class="subtitle">ଗୁଣନ (Multiplication)</p>
            <span class="badge">📚 ଓଡ଼ିଆ ମାଧ୍ୟମ</span>
        </header>

        <!-- Info Cards -->
        <div class="info-cards">
            <div class="info-card">
                <div class="card-emoji">🔢</div>
                <h3>ଗୁଣନ କ’ଣ?</h3>
                <p>ସଂଖ୍ୟାକୁ ବାରମ୍ବାର ଯୋଗ କରିବା</p>
            </div>
            <div class="info-card card-accent">
                <div class="card-emoji">🧠</div>
                <h3>ଗୁଣନ ସାରଣୀ</h3>
                <p>ମନେରଖିବାର ସହଜ ଉପାୟ</p>
            </div>
        </div>

        <!-- Tabs -->
        <nav class="tabs-nav" id="tabsNav">
            <button class="tab-btn active" data-part="1" data-video-id="S0RIniBh62o" onclick="switchPart(1, 'S0RIniBh62o', this)">
                <span class="tab-emoji">1️⃣</span> ଭାଗ ୧
            </button>
            <button class="tab-btn" data-part="2" data-video-id="KpifpOFtnT0" onclick="switchPart(2, 'KpifpOFtnT0', this)">
                <span class="tab-emoji">2️⃣</span> ଭାଗ ୨
            </button>
            <button class="tab-btn" data-part="3" data-video-id="x-FPtynf3D0" onclick="switchPart(3, 'x-FPtynf3D0', this)">
                <span class="tab-emoji">3️⃣</span> ଭାଗ ୩
            </button>
            <button class="tab-btn" data-part="4" data-video-id="zLq0EojWYIo" onclick="switchPart(4, 'zLq0EojWYIo', this)">
                <span class="tab-emoji">4️⃣</span> ଭାଗ ୪
            </button>
        </nav>

        <!-- Video Player -->
        <div class="video-card" id="videoCard">
            <div class="video-wrapper">
                <iframe
                id="videoIframe"
                src="https://www.youtube.com/embed/S0RIniBh62o?rel=0&modestbranding=1"
                title="ଗୁଣନ - ଭାଗ ୧"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
        <div class="video-info">
            <div class="play-icon">
                <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
            </div>
            <div class="info-text">
                <span class="part-label" id="partLabel">ଭାଗ ୧</span>
                <div class="part-title" id="partTitle">ଗୁଣନ - ପ୍ରଥମ ଭାଗ</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        ✨ ଶ୍ରେଣୀ ୪ ପାଇଁ <span>ଗୁଣନ ଶିକ୍ଷା</span> | ସମସ୍ତ ଭାଗ ଦେଖନ୍ତୁ ✨
    </footer>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">🔗 ଲିଙ୍କ କପି ହୋଇଛି!</div>

<script>
    (function() {
        // Video data
        const videoData = {
            1: { id: 'S0RIniBh62o', title: 'ଗୁଣନ - ପ୍ରଥମ ଭାଗ', label: 'ଭାଗ ୧' },
            2: { id: 'KpifpOFtnT0', title: 'ଗୁଣନ - ଦ୍ୱିତୀୟ ଭାଗ', label: 'ଭାଗ ୨' },
            3: { id: 'x-FPtynf3D0', title: 'ଗୁଣନ - ତୃତୀୟ ଭାଗ', label: 'ଭାଗ ୩' },
            4: { id: 'zLq0EojWYIo', title: 'ଗୁଣନ - ଚତୁର୍ଥ ଭାଗ', label: 'ଭାଗ ୪' }
        };

        let currentPart = 1;
        let isSwitching = false;

        // The URL to share (provided)
        const SHARE_URL = 'https://learnodishahelp-cmd.github.io/Quizmaster4/';
        const SHARE_TITLE = 'ଶ୍ରେଣୀ ୪ ଗୁଣନ ଶିକ୍ଷା ଆପ୍ | Class 4 Multiplication';
        const SHARE_TEXT = 'ଓଡ଼ିଆରେ ଗୁଣନ ଶିଖନ୍ତୁ! Check out this Class 4 Multiplication app.';

        window.switchPart = function(partNumber, videoId, btnElement) {
            if (isSwitching || partNumber === currentPart) return;
            isSwitching = true;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            currentPart = partNumber;

            const data = videoData[partNumber];
            const iframe = document.getElementById('videoIframe');
            iframe.src = `https://www.youtube.com/embed/${data.id}?rel=0&modestbranding=1`;

            document.getElementById('partLabel').textContent = data.label;
            document.getElementById('partTitle').textContent = data.title;

            const videoCard = document.getElementById('videoCard');
            videoCard.style.transform = 'scale(1.015)';
            videoCard.style.transition = 'transform 0.2s ease-out';
            setTimeout(() => { videoCard.style.transform = 'scale(1)'; }, 200);

            if (btnElement) {
                btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            setTimeout(() => { isSwitching = false; }, 400);
            if (navigator.vibrate) navigator.vibrate(8);
        };

        // Share functionality
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast.hideTimeout);
            toast.hideTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        async function handleShare() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: SHARE_TITLE,
                        text: SHARE_TEXT,
                        url: SHARE_URL,
                    });
                } catch (err) {
                    // User cancelled or error, do nothing
                }
            } else {
                // Fallback: copy to clipboard
                try {
                    await navigator.clipboard.writeText(SHARE_URL);
                    showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                } catch (err) {
                    // Older fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = SHARE_URL;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                }
            }
        }

        document.getElementById('shareButton').addEventListener('click', handleShare);

        // Touch feedback on tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.94)';
                this.style.transition = 'transform 0.1s ease';
            }, { passive: true });
            btn.addEventListener('touchend', function() {
                this.style.transform = '';
                this.style.transition = 'transform 0.2s ease';
            });
            btn.addEventListener('touchcancel', function() {
                this.style.transform = '';
            });
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' && currentPart < 4) {
                e.preventDefault();
                const next = currentPart + 1;
                const btn = document.querySelector(`.tab-btn[data-part="${next}"]`);
                switchPart(next, videoData[next].id, btn);
            } else if (e.key === 'ArrowLeft' && currentPart > 1) {
                e.preventDefault();
                const prev = currentPart - 1;
                const btn = document.querySelector(`.tab-btn[data-part="${prev}"]`);
                switchPart(prev, videoData[prev].id, btn);
            }
        });

        console.log('✅ ଗୁଣନ ଆପ୍ ପ୍ରସ୍ତୁତ | Gunana App Ready – Class 4 Multiplication');
    })();
</script>
</body>
</html>
